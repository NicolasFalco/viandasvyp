<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Viandas del Día</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 20px 16px 40px; }
  .header { text-align: center; margin-bottom: 28px; padding-top: 8px; }
  .header-emoji { font-size: 40px; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .header .fecha { font-size: 14px; color: #666; margin-top: 4px; }
  .section { margin-bottom: 24px; }
  .section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .menu-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 2.5px solid transparent; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .menu-card.selected { border-color: #e8604c; box-shadow: 0 0 0 4px rgba(232,96,76,0.12); }
  .menu-card:active { transform: scale(0.98); }
  .menu-radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .menu-card.selected .menu-radio { border-color: #e8604c; }
  .menu-radio-dot { width: 11px; height: 11px; border-radius: 50%; background: #e8604c; display: none; }
  .menu-card.selected .menu-radio-dot { display: block; }
  .menu-info { flex: 1; }
  .menu-name { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .menu-desc { font-size: 13px; color: #666; line-height: 1.4; }
  .menu-price { font-size: 16px; font-weight: 700; color: #e8604c; flex-shrink: 0; }
  .delivery-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .delivery-btn { background: white; border-radius: 14px; padding: 14px 12px; border: 2.5px solid transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: border-color 0.15s, box-shadow 0.15s; }
  .delivery-btn.selected { border-color: #e8604c; box-shadow: 0 0 0 4px rgba(232,96,76,0.12); }
  .delivery-btn:active { transform: scale(0.97); }
  .delivery-icon { font-size: 26px; }
  .delivery-label { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .delivery-sub { font-size: 11px; color: #999; text-align: center; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
  .form-input, .form-textarea { width: 100%; padding: 13px 14px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 16px; color: #1a1a1a; background: white; outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; font-family: inherit; }
  .form-textarea { min-height: 70px; resize: none; line-height: 1.4; }
  .form-input:focus, .form-textarea:focus { border-color: #e8604c; }
  .campo-direccion { display: none; }
  .campo-direccion.show { display: block; }
  .error-msg { font-size: 13px; color: #e8604c; margin-top: 5px; display: none; }
  .btn-enviar { width: 100%; padding: 16px; background: #e8604c; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s, transform 0.1s; box-shadow: 0 4px 14px rgba(232,96,76,0.3); }
  .btn-enviar:active { background: #d14a36; transform: scale(0.98); }
  .success-screen { display: none; text-align: center; padding: 60px 20px; }
  .success-screen.show { display: block; }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .success-sub { font-size: 15px; color: #666; line-height: 1.6; }
  .no-menu { text-align: center; padding: 40px 20px; }
  .no-menu-icon { font-size: 48px; margin-bottom: 12px; }
  .no-menu p { font-size: 15px; color: #999; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
<div class="header-emoji">🍱</div>   
 <h1 id="nombre-negocio">Viandas del Día</h1>
    <div class="fecha" id="fecha-hoy"></div>
  </div>
  <div id="main-form">
    <div class="section">
      <div class="section-title">Elegí tu menú</div>
      <div id="menus-container"></div>
      <div class="error-msg" id="err-menu">Por favor elegí un menú</div>
    </div>
    <div class="section">
      <div class="section-title">¿Cómo lo recibís?</div>
      <div class="delivery-row">
        <div class="delivery-btn" id="btn-delivery" onclick="elegirEntrega('delivery')">
          <div class="delivery-icon">🛵</div>
          <div class="delivery-label">Delivery</div>
          <div class="delivery-sub">Te lo llevamos a casa</div>
        </div>
        <div class="delivery-btn" id="btn-retiro" onclick="elegirEntrega('retiro')">
          <div class="delivery-icon">🏪</div>
          <div class="delivery-label">Retiro</div>
          <div class="delivery-sub">Pasás a buscarlo</div>
        </div>
      </div>
      <div class="error-msg" id="err-entrega">Por favor elegí cómo recibís tu pedido</div>
    </div>
    <div class="section">
      <div class="section-title">Tus datos</div>
      <div class="form-group">
        <label class="form-label">Nombre y apellido</label>
        <input class="form-input" id="input-nombre" type="text" placeholder="Ej: María González" autocomplete="name">
      </div>
      <div class="form-group campo-direccion" id="campo-direccion">
        <label class="form-label">Dirección de entrega</label>
        <textarea class="form-textarea" id="input-dir" placeholder="Calle, número, piso/depto, barrio..."></textarea>
      </div>
      <div class="error-msg" id="err-datos">Completá tu nombre y apellido</div>
      <div class="error-msg" id="err-dir">Ingresá tu dirección para el delivery</div>
    </div>
    <button class="btn-enviar" onclick="enviarPedido()">Confirmar pedido →</button>
  </div>
  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">¡Pedido enviado!</div>
    <div class="success-sub" id="success-msg"></div>
  </div>
</div>
<script>
const HOY = new Date();
const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
document.getElementById('fecha-hoy').textContent = DIAS[HOY.getDay()] + ' ' + HOY.getDate() + ' de ' + MESES[HOY.getMonth()];
let menuSeleccionado = null, entregaSeleccionada = null;
function fechaClave() { return HOY.getFullYear()+'-'+(HOY.getMonth()+1)+'-'+HOY.getDate(); }
function cargarMenus() {
  const stored = localStorage.getItem('menus_'+fechaClave());
  const nombre = localStorage.getItem('negocio_nombre');
  if (nombre) document.getElementById('nombre-negocio').textContent = nombre;
  if (!stored) { document.getElementById('menus-container').innerHTML = '<div class="no-menu"><div class="no-menu-icon">🕐</div><p>Los menús de hoy todavía no están disponibles. Volvé más tarde.</p></div>'; return; }
  const menus = JSON.parse(stored);
  document.getElementById('menus-container').innerHTML = menus.map((m,i)=>`<div class="menu-card" id="menu-card-${i}" onclick="elegirMenu(${i})"><div class="menu-radio"><div class="menu-radio-dot"></div></div><div class="menu-info"><div class="menu-name">${m.nombre}</div>${m.descripcion?`<div class="menu-desc">${m.descripcion}</div>`:''}</div>${m.precio?`<div class="menu-price">$${m.precio}</div>`:''}</div>`).join('');
}
function elegirMenu(i) { menuSeleccionado=i; document.querySelectorAll('.menu-card').forEach((c,idx)=>c.classList.toggle('selected',idx===i)); document.getElementById('err-menu').style.display='none'; }
function elegirEntrega(tipo) {
  entregaSeleccionada=tipo;
  document.getElementById('btn-delivery').classList.toggle('selected',tipo==='delivery');
  document.getElementById('btn-retiro').classList.toggle('selected',tipo==='retiro');
  document.getElementById('campo-direccion').classList.toggle('show',tipo==='delivery');
  document.getElementById('err-entrega').style.display='none';
  document.getElementById('err-dir').style.display='none';
}
function enviarPedido() {
  let ok=true;
  if (menuSeleccionado===null){document.getElementById('err-menu').style.display='block';ok=false;}
  if (!entregaSeleccionada){document.getElementById('err-entrega').style.display='block';ok=false;}
  const nombre=document.getElementById('input-nombre').value.trim();
  if (!nombre){document.getElementById('err-datos').style.display='block';ok=false;}
  const dir=document.getElementById('input-dir').value.trim();
  if (entregaSeleccionada==='delivery'&&!dir){document.getElementById('err-dir').style.display='block';ok=false;}
  if (!ok) return;
  const menus=JSON.parse(localStorage.getItem('menus_'+fechaClave())||'[]');
  const menu=menus[menuSeleccionado];
  const waNum=localStorage.getItem('wa_numero')||'5493514567890';
  const entregaTexto=entregaSeleccionada==='delivery'?'🛵 Delivery':'🏪 Retiro en local';
  const dirLinea=entregaSeleccionada==='delivery'?'%0A📍 *Dirección:* '+encodeURIComponent(dir):'';
  const fecha=HOY.getDate()+'/'+(HOY.getMonth()+1)+'/'+HOY.getFullYear();
  const hora=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const msg='🍱 *Nuevo pedido*%0A📋 *Menú:* '+encodeURIComponent(menu.nombre)+'%0A'+encodeURIComponent(entregaTexto)+dirLinea+'%0A👤 *Nombre:* '+encodeURIComponent(nombre)+'%0A📅 *Fecha:* '+fecha+' '+hora;
  const pedidos=JSON.parse(localStorage.getItem('pedidos_'+fechaClave())||'[]');
  pedidos.push({menu:menu.nombre,entrega:entregaSeleccionada,direccion:dir||'-',nombre,fecha,hora});
  localStorage.setItem('pedidos_'+fechaClave(),JSON.stringify(pedidos));
  window.open('https://wa.me/'+waNum+'?text='+msg,'_blank');
  document.getElementById('main-form').style.display='none';
  document.getElementById('success-screen').classList.add('show');
  document.getElementById('success-msg').textContent='Tu pedido fue enviado. ¡Gracias '+nombre+'!';
}
cargarMenus();
</script>
</body>
</html>
